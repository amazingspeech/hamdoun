<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van Dijk Clinic — Boekingsassistent (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#D48C84;
    --accent-dark:#B76D65;
    --dark:#220E06;
    --grey:#6B6058;
    --bg:#FBF9F6;
    --card:#FFFFFF;
    --border:#E9E1DA;
    --patient-bubble:#220E06;
    --agent-bubble:#F5EAE6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:var(--bg);
    font-family:'Roboto', sans-serif;
    color:var(--dark);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .stage{
    width:100%;
    max-width:480px;
  }
  .badge{
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:center;
    margin-bottom:14px;
    font-size:12.5px;
    color:var(--grey);
    letter-spacing:.02em;
  }
  .badge .dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    flex:none;
  }
  .phone{
    background:var(--card);
    border-radius:22px;
    border:1px solid var(--border);
    box-shadow:0 20px 60px -20px rgba(34,14,6,0.25), 0 2px 8px rgba(34,14,6,0.06);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    height:640px;
  }
  .header{
    padding:20px 22px 16px;
    background:linear-gradient(180deg, #ffffff 0%, #fdfaf8 100%);
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:12px;
  }
  .logo{
    width:38px;height:38px;border-radius:50%;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:'Roboto Slab',serif;font-weight:700;font-size:15px;
    flex:none;
  }
  .header-text h1{
    font-family:'Roboto Slab', serif;
    font-size:15.5px;
    font-weight:700;
    margin:0 0 2px;
    letter-spacing:.01em;
  }
  .header-text p{
    margin:0;
    font-size:11.5px;
    color:var(--grey);
    display:flex;
    align-items:center;
    gap:5px;
  }
  .online-dot{
    width:6px;height:6px;border-radius:50%;
    background:#5CA971;
    flex:none;
  }
  .messages{
    flex:1;
    overflow-y:auto;
    padding:20px 18px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:
      radial-gradient(circle at 15% 8%, rgba(212,140,132,0.06), transparent 40%),
      var(--bg);
  }
  .row{
    display:flex;
    max-width:86%;
    animation:rise .32s ease;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(6px);}
    to{opacity:1; transform:translateY(0);}
  }
  .row.patient{ align-self:flex-end; }
  .row.agent{ align-self:flex-start; }
  .bubble{
    padding:10px 14px;
    border-radius:16px;
    font-size:13.6px;
    line-height:1.48;
    white-space:pre-wrap;
  }
  .row.patient .bubble{
    background:var(--patient-bubble);
    color:#fdf6f3;
    border-bottom-right-radius:4px;
  }
  .row.agent .bubble{
    background:var(--agent-bubble);
    color:var(--dark);
    border-bottom-left-radius:4px;
  }
  .row.agent .bubble strong{ color:var(--accent-dark); }
  .row.system{
    align-self:center;
    max-width:92%;
  }
  .row.system .bubble{
    background:transparent;
    border:1px dashed #d8c9c2;
    color:var(--grey);
    font-size:11.5px;
    text-align:center;
    border-radius:10px;
    padding:6px 12px;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:12px 15px;
    background:var(--agent-bubble);
    border-radius:16px;
    border-bottom-left-radius:4px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:#b7a89f;
    animation:blink 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes blink{
    0%,80%,100%{opacity:.25; transform:translateY(0);}
    40%{opacity:1; transform:translateY(-2px);}
  }
  .controls{
    border-top:1px solid var(--border);
    padding:14px 18px;
    background:#fff;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .fake-input{
    flex:1;
    height:38px;
    border-radius:19px;
    background:var(--bg);
    border:1px solid var(--border);
    display:flex;
    align-items:center;
    padding:0 14px;
    font-size:13px;
    color:var(--grey);
  }
  .next-btn{
    height:38px;
    padding:0 18px;
    border-radius:19px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-family:'Roboto', sans-serif;
    font-weight:500;
    font-size:13px;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
    white-space:nowrap;
  }
  .next-btn:hover{ background:var(--accent-dark); }
  .next-btn:active{ transform:scale(.97); }
  .next-btn:disabled{
    background:#ddd2cc;
    cursor:default;
  }
  .restart{
    text-align:center;
    margin-top:14px;
  }
  .restart button{
    background:none;
    border:none;
    color:var(--grey);
    font-size:12.5px;
    text-decoration:underline;
    cursor:pointer;
    font-family:'Roboto', sans-serif;
  }
  .restart button:hover{ color:var(--accent-dark); }
</style>
</head>
<body>

<div class="stage">
  <div class="badge"><span class="dot"></span>Gesimuleerde demo van een echt getest gesprek — geen live AI-verbinding</div>

  <div class="phone">
    <div class="header">
      <div class="logo">VD</div>
      <div class="header-text">
        <h1>Van Dijk Clinic</h1>
        <p><span class="online-dot"></span>Boekingsassistent</p>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="controls">
      <div class="fake-input" id="fakeInputLabel">Typ je bericht...</div>
      <button class="next-btn" id="nextBtn">Volgende ▸</button>
    </div>
  </div>

  <div class="restart"><button id="restartBtn">↻ Gesprek opnieuw afspelen</button></div>
</div>

<script>
const script = [
  { who: "agent", text: "Hoi! 👋 Ik ben de boekingsassistent van Van Dijk Clinic (testversie).\nIk kan je helpen met eenvoudige boekingsvragen. Bij medische vragen zet ik je door naar een medewerker." },
  { who: "patient", text: "hoi, ik wil graag iets laten doen aan mijn lippen" },
  { who: "agent", text: "Hoi! Leuk dat je contact opneemt met Van Dijk Clinic. 😊\n\nOm je goed te kunnen helpen, heb ik nog een paar kleine dingen nodig:\n1. Wat wil je precies laten doen? Denk je aan het vullen van je lippen (met een filler), of wil je juist iets anders, zoals het oplossen van een bestaande filler?\n2. Ben je al eerder bij ons geweest? Of zou dit je eerste keer zijn?" },
  { who: "patient", text: "filler graag, en ja ik ben al eerder bij jullie geweest" },
  { who: "agent", text: "Top, dan weten we genoeg! 😊\n\nHeb je al een idee van wanneer je zou willen komen? Bijvoorbeeld een bepaalde week of dagdeel dat goed uitkomt?" },
  { who: "patient", text: "weet je wat, ik doe toch liever iets tegen mijn rimpels, dus botox. volgende week woensdag rond een uur of 2 zou fijn zijn" },
  { who: "agent", text: "Goed nieuws! Op woensdag 22 juli zijn er nog plekjes beschikbaar:\n\n• 14:00 uur\n• 14:30 uur\n\nWelke tijd past jou het beste? En dan heb ik ook nog even je naam en telefoonnummer nodig om de afspraak te bevestigen. 😊" },
  { who: "patient", text: "trouwens, mag ik gewoon sporten na de botox behandeling?" },
  { who: "system", text: "📨 escalatie verstuurd naar de balie — \"Vraag over sporten na botox behandeling\"" },
  { who: "agent", text: "Goede vraag! Helaas kan ik inhoudelijke medische vragen niet zelf beantwoorden. Ik heb je vraag doorgezet naar één van onze medewerkers, die neemt zo snel mogelijk contact met je op. 😊\n\nMaar laten we ondertussen ook je afspraak vastzetten! Welke tijd past jou beter — 14:00 of 14:30 op woensdag 22 juli? En wat zijn je naam en telefoonnummer?" },
  { who: "patient", text: "14:00 is goed, ik ben Sanne de Boer, 0623456789" },
  { who: "system", text: "✅ afspraak vastgelegd in Clinicminds" },
  { who: "agent", text: "Je afspraak staat! 🎉 Hier een bevestiging:\n\n• Naam: Sanne de Boer\n• Behandeling: Botuline Toxine type A herhaalbehandeling\n• Datum: woensdag 22 juli 2026\n• Tijd: 14:00 uur\n• Locatie: Weverssingel 7, 3811 GJ Amersfoort\n\nParkeren kan niet direct voor de deur (autoluwe binnenstad), maar parkeergarage De Flint aan de Walikerstraat 14 is een goede optie. 😊\n\nEn onze medewerker neemt nog contact met je op over je vraag over sporten na de behandeling. Tot 22 juli, Sanne!" },
  { who: "patient", text: "kan ik nog korting krijgen omdat ik vaste klant ben?" },
  { who: "agent", text: "Wat een leuke vraag, maar helaas kan ik daar zelf geen uitsluitsel over geven — kortingen en acties zijn iets wat onze medewerkers voor je kunnen uitzoeken! 😊\n\nJe kunt hen bereiken via:\n• Telefoon: 033 - 78 50 391\n• E-mail: info@vandijkclinic.nl\n\nDan kunnen ze je precies vertellen wat er mogelijk is. Tot 22 juli!" },
  { who: "patient", text: "en doen jullie ook botox onder de oksels tegen zweten?" },
  { who: "agent", text: "Goede vraag! Helaas bied ik daar geen informatie over — ik kan alleen helpen met de behandelingen die Van Dijk Clinic aanbiedt, en botox tegen overmatig zweten (hyperhidrose) staat niet in ons behandelaanbod.\n\nVoor meer informatie kun je contact opnemen met de kliniek:\n• Telefoon: 033 - 78 50 391\n• E-mail: info@vandijkclinic.nl\n\nZij kunnen je vertellen of dit iets is wat ze (eventueel) kunnen aanbieden of je doorverwijzen. 😊" },
  { who: "system", text: "— einde van het gesprek —" },
];

const messagesEl = document.getElementById("messages");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
let i = 0;
let busy = false;

function scrollDown(){ messagesEl.scrollTop = messagesEl.scrollHeight; }

function addBubble(entry){
  const row = document.createElement("div");
  row.className = "row " + entry.who;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = entry.text;
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollDown();
}

function showTyping(){
  const row = document.createElement("div");
  row.className = "row agent";
  row.id = "typingRow";
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.innerHTML = "<span></span><span></span><span></span>";
  row.appendChild(typing);
  messagesEl.appendChild(row);
  scrollDown();
}

function removeTyping(){
  const el = document.getElementById("typingRow");
  if (el) el.remove();
}

function step(){
  if (busy || i >= script.length){
    if (i >= script.length){
      nextBtn.disabled = true;
      nextBtn.textContent = "Einde demo";
    }
    return;
  }
  busy = true;
  nextBtn.disabled = true;
  const entry = script[i];

  if (entry.who === "agent"){
    showTyping();
    setTimeout(() => {
      removeTyping();
      addBubble(entry);
      i++;
      busy = false;
      nextBtn.disabled = (i >= script.length);
      if (i >= script.length) nextBtn.textContent = "Einde demo";
    }, 700 + Math.min(entry.text.length * 4, 900));
  } else {
    addBubble(entry);
    i++;
    busy = false;
    nextBtn.disabled = (i >= script.length);
    if (i >= script.length) nextBtn.textContent = "Einde demo";
  }
}

function restart(){
  messagesEl.innerHTML = "";
  i = 0;
  busy = false;
  nextBtn.disabled = false;
  nextBtn.textContent = "Volgende ▸";
  step(); // toon het openingsbericht meteen
}

nextBtn.addEventListener("click", step);
restartBtn.addEventListener("click", restart);

// start met het openingsbericht zichtbaar
step();
</script>

</body>
</html>
