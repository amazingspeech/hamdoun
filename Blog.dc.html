<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:oklch(98% 0.004 90); }
  body { font-family:'IBM Plex Sans', -apple-system, 'Segoe UI', sans-serif; color:oklch(18% 0.02 255); line-height:1.55; -webkit-font-smoothing:antialiased; }
  a { color:oklch(18% 0.02 255); text-decoration:none; }
  a:hover { color:oklch(48% 0.12 230); }
  @keyframes floatCube {
    0% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
    25% { transform: translateY(-8px) rotateX(15deg) rotateY(10deg); }
    50% { transform: translateY(0px) rotateX(30deg) rotateY(25deg); }
    75% { transform: translateY(-8px) rotateX(15deg) rotateY(10deg); }
    100% { transform: translateY(0px) rotateX(0deg) rotateY(0deg); }
  }
  @keyframes orbitCube {
    0% { transform: rotate(0deg) translateX(60px) rotateZ(0deg); }
    50% { transform: rotate(180deg) translateX(60px) rotateZ(180deg); }
    100% { transform: rotate(360deg) translateX(60px) rotateZ(360deg); }
  }
</style>
</helmet>

<header style="position:sticky;top:0;z-index:30;background:color-mix(in oklch, oklch(98% 0.004 90) 88%, transparent);backdrop-filter:blur(10px);border-bottom:1px solid oklch(90% 0.006 90);">
  <div style="max-width:1200px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;">
    <a href="/index.html" style="display:flex;align-items:center;gap:10px;">
      <img src="./assets/tessar-icon.png" alt="" style="height:36px;width:auto;">
      <span style="font:700 1.125rem/1 'IBM Plex Sans';letter-spacing:-0.015em;color:oklch(18% 0.02 255);">Tessar</span>
    </a>
    <nav style="display:flex;align-items:center;gap:32px;">
      <a href="/index.html#projects" style="font-size:0.9375rem;color:oklch(46% 0.012 140);transition:color 200ms ease;" style-hover="color:oklch(18% 0.02 255);">{{ nav2 }}</a>
      <a href="/index.html#contact" style="font-size:0.9375rem;color:oklch(46% 0.012 140);transition:color 200ms ease;" style-hover="color:oklch(18% 0.02 255);">{{ nav5 }}</a>
      <div style="display:flex;gap:2px;border:1px solid oklch(88% 0.006 90);border-radius:20px;padding:3px;background:oklch(100% 0 0);">
        <button onClick="{{ setLangNl }}" style="cursor:pointer;border:none;padding:6px 10px;border-radius:16px;background:{{ nlBg }};color:{{ nlColor }};font:500 0.75rem/1 'IBM Plex Mono';transition:all 200ms ease;">NL</button>
        <button onClick="{{ setLangEn }}" style="cursor:pointer;border:none;padding:6px 10px;border-radius:16px;background:{{ enBg }};color:{{ enColor }};font:500 0.75rem/1 'IBM Plex Mono';transition:all 200ms ease;">EN</button>
      </div>
    </nav>
  </div>
</header>

<main>
<section style="position:relative;overflow:hidden;background:oklch(14% 0.03 255);color:oklch(97% 0.004 90);padding:120px 0;">
  <div style="position:absolute;top:-100px;right:-150px;width:600px;height:600px;opacity:0.12;pointer-events:none;">
    <svg viewBox="0 0 400 400" style="width:100%;height:100%;animation:floatCube 12s ease-in-out infinite;">
      <g style="transform-origin:200px 200px;">
        <rect x="150" y="150" width="100" height="100" fill="none" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></rect>
        <rect x="170" y="130" width="100" height="100" fill="none" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></rect>
        <line x1="150" y1="150" x2="170" y2="130" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></line>
        <line x1="250" y1="150" x2="270" y2="130" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></line>
        <line x1="150" y1="250" x2="170" y2="230" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></line>
        <line x1="250" y1="250" x2="270" y2="230" stroke="oklch(72% 0.14 220)" stroke-width="2" opacity="0.6"></line>
        <g style="animation:orbitCube 15s linear infinite;">
          <rect x="240" y="240" width="30" height="30" fill="none" stroke="oklch(72% 0.14 220)" stroke-width="1.5" opacity="0.4"></rect>
        </g>
      </g>
    </svg>
  </div>

  <div style="max-width:1200px;margin:0 auto;padding:0 40px;position:relative;z-index:1;">
    <h1 style="font:600 3rem/1.1 'IBM Plex Sans';max-width:800px;letter-spacing:-0.02em;color:#FFF;margin:0 0 24px;">{{ heading }}</h1>
    <p style="font:400 1.125rem/1.6 'IBM Plex Sans';color:oklch(78% 0.012 140);max-width:700px;margin:0;">{{ subheading }}</p>
  </div>
</section>

<section style="padding:88px 0;background:oklch(98% 0.004 90);">
  <div style="max-width:1200px;margin:0 auto;padding:0 40px;">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:40px;">
      <sc-for list="{{ articles }}" as="article" hint-placeholder-count="3">
        <article style="background:#FFF;border:1px solid oklch(91% 0.006 90);border-radius:12px;overflow:hidden;box-shadow:0 1px 2px oklch(20% 0.02 255 / 0.04), 0 16px 32px -20px oklch(20% 0.02 255 / 0.12);transition:all 200ms ease;" style-hover="border-color:oklch(48% 0.12 230 / 0.3);box-shadow:0 2px 4px oklch(20% 0.02 255 / 0.06), 0 20px 40px -16px oklch(48% 0.12 230 / 0.15);transform:translateY(-4px);">
          <div style="background:oklch(88% 0.006 90);height:180px;display:flex;align-items:center;justify-content:center;font:500 0.875rem/1.5 'IBM Plex Mono';color:oklch(46% 0.012 140);">{{ article.category }}</div>
          <div style="padding:28px;">
            <div style="font:500 0.75rem/1 'IBM Plex Mono';color:oklch(46% 0.012 140);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.05em;">{{ article.date }}</div>
            <h3 style="font:600 1.25rem/1.35 'IBM Plex Sans';margin:0 0 12px;letter-spacing:-0.01em;color:oklch(18% 0.02 255);">{{ article.title }}</h3>
            <p style="font:400 0.9375rem/1.6 'IBM Plex Sans';color:oklch(46% 0.012 140);margin:0 0 20px;">{{ article.excerpt }}</p>
            <a href="{{ article.link }}" style="font:500 0.875rem/1 'IBM Plex Mono';color:oklch(48% 0.12 230);transition:color 200ms ease;" style-hover="color:oklch(18% 0.02 255);">{{ readMore }} →</a>
          </div>
        </article>
      </sc-for>
    </div>
  </div>
</section>
</main>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { lang: 'nl' };

  renderVals() {
    const isNL = this.state.lang === 'nl';

    const articles = [
      { category: 'EU AI Act', date: isNL ? 'MEI 2026' : 'MAY 2026', title: isNL ? 'EU AI Act: wat verandert voor SME-processen' : 'EU AI Act: what changes for SME processes', excerpt: isNL ? 'Transparantie, documentatie en menselijk toezicht—eisen die we nu al inbouwen.' : 'Transparency, documentation, and human oversight requirements we\'re building for now.', link: '#' },
      { category: 'Case Study', date: isNL ? 'APR 2026' : 'APR 2026', title: isNL ? 'Wanneer automatisering fout gaat' : 'When automation goes wrong', excerpt: isNL ? 'Drie echte cases waar we de workflow stopttten in plaats van een besluit af te dwingen.' : 'Three real cases where we stopped the workflow instead of forcing a decision.', link: '#' },
      { category: 'Strategy', date: isNL ? 'MAR 2026' : 'MAR 2026', title: isNL ? 'Het juiste knelpunt kiezen' : 'On choosing the right bottleneck', excerpt: isNL ? 'Niet elk probleem is oplosbaar met AI. We slaan projecten af die niet passen.' : 'Not every problem is solvable with AI. We turn down projects that don\'t fit.', link: '#' },
    ];

    return {
      nav2: isNL ? 'Projecten' : 'Projects',
      nav5: isNL ? 'Contact' : 'Contact',
      heading: isNL ? 'Wat we leren onderweg' : 'What we\'re learning along the way',
      subheading: isNL ? 'Inzichten uit live deployments, echte gebruikers, en het navigeren van AI ethics in praktijk.' : 'Insights from live deployments, real users, and navigating AI ethics in practice.',
      articles,
      readMore: isNL ? 'Lees meer' : 'Read more',
      setLangNl: () => this.setState({ lang: 'nl' }),
      setLangEn: () => this.setState({ lang: 'en' }),
      nlBg: this.state.lang === 'nl' ? 'oklch(18% 0.02 255)' : 'transparent',
      nlColor: this.state.lang === 'nl' ? 'oklch(98% 0.004 90)' : 'oklch(46% 0.012 140)',
      enBg: this.state.lang !== 'nl' ? 'oklch(18% 0.02 255)' : 'transparent',
      enColor: this.state.lang !== 'nl' ? 'oklch(98% 0.004 90)' : 'oklch(46% 0.012 140)',
    };
  }
}
</script>
</body>
</html>
